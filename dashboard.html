<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#9adfa1;
}


.sidebar{
height:100vh;
background:white;
border-right:1px solid #eee;
padding:20px;
}

.logo{
font-size:22px;
font-weight:bold;
color:#2e7d32;
margin-bottom:30px;
}

.sidebar a{
display:block;
text-decoration:none;
color:#333;
padding:10px;
border-radius:6px;
margin-bottom:5px;
}

.sidebar a:hover{
background:#2e7d32;
color:white;
}

/* iklan */

.banner{
background:linear-gradient(90deg,#57b85c,#77c479);
color:white;
padding:30px;
border-radius:10px;
margin-bottom:25px;
}


.product-img{
height:170px;
object-fit:contain;
}

</style>

</head>

<body>

<div class="container-fluid">

<div class="row">


<div class="col-md-2 sidebar">

<div class="logo">PINDAKI</div>

<a href="dashboard.html">Beranda</a>
<a href="orders.html">Pesanan</a>
<a href="profile.html">Profile</a>

</div>



<div class="col-md-10 p-4">


<div class="banner d-flex justify-content-between align-items-center">

<div>
<h4>Promo Sewa Alat Pendakian</h4>
<p>Diskon 20% untuk penyewaan pertama!</p>
<button class="btn btn-light">Lihat Promo</button>
</div>

<img src="tenda.jpg" width="150">

</div>


<div class="input-group mb-4">
<input type="text" class="form-control" placeholder="Cari alat pendakian...">
<button class="btn btn-success">Cari</button>
</div>

<h4 class="mb-3">Produk</h4>

<div class="row g-4">

<!-- Tenda -->

<div class="col-md-3">
<div class="card shadow-sm">
<img src="tenda.jpg" class="card-img-top product-img">
<div class="card-body text-center">
<h5 class="card-title">Tenda</h5>
<p class="text-success">Rp100.000 / hari</p>
<a href="produk2.html" class="btn btn-success">Detail</a>
</div>
</div>
</div>

<!-- Carrier -->

<div class="col-md-3">
<div class="card shadow-sm">
<img src="Carrier.jpg" class="card-img-top product-img">
<div class="card-body text-center">
<h5 class="card-title">Carrier</h5>
<p class="text-success">Rp60.000 / hari</p>
<a href="produk4.html" class="btn btn-success">Detail</a>
</div>
</div>
</div>

<!-- Sepatu -->

<div class="col-md-3">
<div class="card shadow-sm">
<img src="Sepatu1.jpg" class="card-img-top product-img">
<div class="card-body text-center">
<h5 class="card-title">Sepatu Hiking</h5>
<p class="text-success">Rp80.000 / hari</p>
<a href="produk3.html" class="btn btn-success">Detail</a>
</div>
</div>
</div>

<!-- Jaket -->

<div class="col-md-3">
<div class="card shadow-sm">
<img src="jaket.webp" class="card-img-top product-img">
<div class="card-body text-center">
<h5 class="card-title">Jaket Windbreaker</h5>
<p class="text-success">Rp80.000 / hari</p>
<a href="produk1.html" class="btn btn-success">Detail</a>
</div>
</div>
</div>

</div>

</div>

</div>

</div>

</body>
</html>
