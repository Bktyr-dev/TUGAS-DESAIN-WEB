<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
margin:0;
background:#9adfa1;
}

/* SIDEBAR */

.sidebar{
width:220px;
height:100vh;
background:#aef3b4;
position:fixed;
padding:25px 20px;
border-right:1px solid #e5e5e5;
}

.logo{
font-size:22px;
font-weight:bold;
color:#2e7d32;
margin-bottom:30px;
}

.sidebar a{
display:block;
text-decoration:none;
color:#333;
padding:10px;
margin-bottom:8px;
border-radius:6px;
transition:0.2s;
}

.sidebar a:hover{
background:#2e7d32;
color:rgb(99, 177, 112);
}

/* MAIN */

.main{
margin-left:240px;
padding:35px;
}

.main h2{
margin-bottom:25px;
}

/* GRID PRODUK */

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:25px;
}

/* CARD */

.card{
background:white;
padding:18px;
border-radius:12px;
border:1px solid #e6e6e6;
text-align:center;
transition:0.2s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 6px 15px rgba(0,0,0,0.08);
}

.card img{
width:100%;
height:150px;
object-fit:contain;
border-radius:8px;
}

.card h4{
margin:15px 0 10px 0;
}

/* BUTTON */

button{
background:#2e7d32;
color:white;
border:none;
padding:10px 16px;
border-radius:6px;
font-size:14px;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#256628;
}

</style>
</head>

<body>

<div class="sidebar">
<div class="logo">PINDAKI</div>

<a href="dashboard.html">Beranda</a>
<a href="orders.html">Pesanan</a>
<a href="profile.html">Profile</a>
</div>

<div class="main">

<h2>Produk</h2>

<div class="grid">

<div class="card">
<img src="jaket.webp">
<h4>Jaket Windbreaker</h4>
<a href="produk.html"><button>Detail</button></a>
</div>

<div class="card">
<img src="tenda.jpg">
<h4>Tenda</h4>
<a href="produk2.html"><button>Detail</button></a>
</div>

<div class="card">
<img src="Sepatu1.jpg">
<h4>Sepatu</h4>
<a href="produk3.html"><button>Detail</button></a>
</div>

<div class="card">
<img src="carrier.jpg">
<h4>Carrier</h4>
<a href="produk4.html"><button>Detail</button></a>
</div>

</div>
</div>

</body>
</html>
