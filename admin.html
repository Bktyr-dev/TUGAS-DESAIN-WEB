
<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<style>
body{font-family:Arial;background:#f4f6f3}
.container{max-width:1000px;margin:60px auto}
.card{background:white;padding:20px;border-radius:10px;margin-bottom:20px}
table{width:100%}
th,td{padding:10px;border-bottom:1px solid #eee}
</style>
</head>
<body>

<div class="container">
<h2>Admin Dashboard</h2>

<div class="card">
<h3>Statistik</h3>
<p>Total Produk: 25</p>
<p>Total Pesanan: 40</p>
</div>

<div class="card">
<h3>Manajemen Produk</h3>
<table>
<tr>
<th>Produk</th>
<th>Harga</th>
<th>Status</th>
</tr>
<tr>
<td>Tenda</td>
<td>40000</td>
<td>Tersedia</td>
</tr>
</table>
</div>

</div>

</body>
</html>
