<!DOCTYPE html>
<html>
<head>
<title>Pesanan</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:#f4f6f3;
margin:0;
}

.header{
background:#2e7d32;
color:white;
padding:15px 30px;
font-size:20px;
font-weight:bold;
}

.container{
max-width:800px;
margin:50px auto;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.status{
color:green;
font-weight:bold;
}

.btn{
text-decoration:none;
color:white;
background:#2e7d32;
padding:10px 15px;
border-radius:6px;
display:inline-block;
margin-top:20px;
}

</style>

</head>

<body>

<div class="header">
Pesanan Saya
</div>

<div class="container">

<div class="card">
<h3>Tenda 4 Orang</h3>
<p>Total : Rp120.000</p>
<p>Status : <span class="status">Berhasil Dibayar</span></p>
</div>

<div class="card">
<h3>Carrier 60L</h3>
<p>Total : Rp80.000</p>
<p>Status : <span class="status">Berhasil Dibayar</span></p>
</div>

<div class="card">
<h3>Sepatu Hiking</h3>
<p>Total : Rp70.000</p>
<p>Status : <span class="status">Berhasil Dibayar</span></p>
</div>

<div class="card">
<h3>Jaket Windbreaker</h3>
<p>Total : Rp50.000</p>
<p>Status : <span class="status">Berhasil Dibayar</span></p>
</div>

<a href="dashboard.html" class="btn">Kembali ke Dashboard</a>

</div>

</body>
</html>
