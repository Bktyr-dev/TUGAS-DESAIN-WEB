<!DOCTYPE html>
<html>
<head>
<title>Profile</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:#f4f6f3;
margin:0;
}

/* HEADER */

.header{
background:#2e7d32;
color:white;
padding:15px 30px;
font-size:20px;
font-weight:bold;
}

/* CONTAINER */

.container{
max-width:500px;
margin:60px auto;
}

/* CARD */

.box{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
text-align:center;
}

/* FOTO PROFILE */

.avatar{
width:100px;
height:100px;
border-radius:50%;
background:#ddd;
margin:auto;
margin-bottom:20px;
background-image:url("profile.png");
background-size:cover;
background-position:center;
}

/* INPUT */

label{
display:block;
text-align:left;
font-size:14px;
margin-top:10px;
}

input{
width:100%;
padding:12px;
margin-top:5px;
border:1px solid #ddd;
border-radius:6px;
}

/* BUTTON */

button{
width:100%;
background:#2e7d32;
color:white;
border:none;
padding:12px;
border-radius:6px;
font-size:16px;
margin-top:20px;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#256628;
}

/* LINK */

.back{
display:block;
margin-top:15px;
text-decoration:none;
color:#2e7d32;
}

</style>

</head>

<body>

<div class="header">
PINDAKI - Profile
</div>

<div class="container">

<div class="box">

<div class="avatar"></div>

<h2>Profile User</h2>

<label>Nama</label>
<input value="Nama User">

<label>Email</label>
<input value="user@email.com">

<label>No HP</label>
<input value="08123456789">

<button>Update Profile</button>

<a href="dashboard.html" class="back">Kembali ke Dashboard</a>

</div>

</div>

</body>
</html>
