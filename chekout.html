<!DOCTYPE html>
<html>
<head>
<title>Checkout</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:#f4f6f3;
margin:0;
}

.header{
background:#2e7d32;
color:white;
padding:15px 30px;
font-size:20px;
font-weight:bold;
}

.container{
max-width:900px;
margin:50px auto;
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

h3{
margin-top:0;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ddd;
border-radius:6px;
}

.summary p{
margin:10px 0;
font-size:16px;
}

.total{
font-size:18px;
font-weight:bold;
margin-top:15px;
}

button{
width:100%;
background:#2e7d32;
color:white;
border:none;
padding:12px;
border-radius:6px;
font-size:16px;
cursor:pointer;
margin-top:20px;
}

button:hover{
background:#256628;
}

</style>

</head>

<body>

<div class="header">
PINDAKI - Checkout
</div>

<form action="orders.html">

<div class="container">

<div class="card">

<h3>Data Penyewa</h3>

<input type="text" placeholder="Nama" required>
<input type="text" placeholder="No HP" required>
<input type="text" placeholder="Alamat" required>

</div>

<div class="card summary">

<h3>Ringkasan Pesanan</h3>

<p>Produk : Tenda 4 Orang</p>
<p>Durasi : 2 Hari</p>

<p class="total">Total : Rp120.000</p>

<button type="submit">Bayar Sekarang</button>

</div>

</div>

</form>

</body>
</html>
